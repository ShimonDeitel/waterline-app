name: Waterline
options:
  bundleIdPrefix: com.shimondeitel.waterline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Waterline:
    type: application
    platform: iOS
    sources:
      - path: Waterline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waterline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Waterline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WaterlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WaterlineTests
      - path: Waterline.storekit
    dependencies:
      - target: Waterline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waterline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WaterlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WaterlineUITests
    dependencies:
      - target: Waterline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waterline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Waterline:
    build:
      targets:
        Waterline: all
        WaterlineTests: [test]
        WaterlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Waterline.storekit
    test:
      config: Debug
      storeKitConfiguration: Waterline.storekit
      targets:
        - WaterlineTests
        - WaterlineUITests
    archive:
      config: Release
